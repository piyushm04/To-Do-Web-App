<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="goal-section">
  <input type="text" id="goalInput" placeholder="Enter your goal (e.g. lose weight)">
  <button onclick="generateFromGoal()">Generate Plan</button>
</div>

  <div class="container">
    <h1>Task Manager</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter task">

      <select id="priority">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <input type="date" id="deadline">

      <button onclick="addTask()">Add Task</button>
    </div>

    <input type="text" id="search" placeholder="Search..." onkeyup="renderTasks()">

    <select id="filter" onchange="renderTasks()">
      <option value="All">All</option>
      <option value="Pending">Pending</option>
      <option value="Done">Done</option>
    </select>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
